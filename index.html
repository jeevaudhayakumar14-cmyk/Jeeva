<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adhiparasakthi Engineering College Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <img src="logo.png" class="logo" alt="College Logo">

    <h2>Adhiparasakthi Engineering College</h2>

    <form>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
